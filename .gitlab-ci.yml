include:
  - project: 'public-repository/gitlab-ci'
    file:
      - 'prepare/global_variables.yml'

stages:
  - build
  - prepare
  - pre-merge
  - promote
  - cybersecurity
  - send_cybersecurity_reports
  - deploy
  - notification

variables:
  IMAGE_TAG: ${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
  IMAGE_TAG_CI_COMMIT_SHA: ${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
  APP_DIR: "src"
  HELM_RELEASE_PREFIX: "adminpanel"
  APP_NAME: "gc-adminpanel"
  TAG: kubernetes-buildah-std
  TAG_PROD: p-deployer
  CI_API_V4_URL: "https://git.sberdevices.ru/api/v4/"


build_image:
  stage: build
  image: ${BUILDAH_IMAGE}
  tags:
    - $TAG
  variables:
    CLOUD_DOCKERFILE_PATH: Dockerfile
    BUILDAH_LAYERS: "true"
    STORAGE_DRIVER: "vfs"
  script:
    - buildah --version
    - ls -la
    - echo "Build Image:"
    - echo $IMAGE_TAG
    - echo $CI_JOB_TOKEN | buildah login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY || true
    - buildah build -t $IMAGE_TAG -f $APP_DIR/Dockerfile .
    - buildah push $IMAGE_TAG
  rules:
    - if: '$REDEPLOY_ONLY'
      when: never
    - if: "$CI_COMMIT_BRANCH =~ /^(main|develop|hotfix|feature).*$/"
      changes:
        - "$APP_DIR/**/*"
        - "public/**/*"
        - "*.json"
        - "*.ts"
      when: on_success
    - when: never

deploy_to_openshift_predev:
  stage: deploy
  image: ${HELM_IMAGE}
  environment: predev
  tags:
    - ${TAG}
  variables:
    HELM_SET_ARGS: >
      --history-max 5
      --set image.tag=$IMAGE_TAG_CI_COMMIT_SHA
  script:
    - RELEASE_NAME="${HELM_RELEASE_PREFIX}-${CI_COMMIT_REF_SLUG}"
    - echo $RELEASE_NAME
    - oc login $OPENSHIFT_SERVER --token=$OPENSHIFT_TOKEN --insecure-skip-tls-verify=true
    - oc project $OPENSHIFT_PROJECT
    - helm upgrade --install $RELEASE_NAME ./helm --namespace $OPENSHIFT_PROJECT --values ./helm/values-$CI_ENVIRONMENT_NAME.yaml $HELM_SET_ARGS
    - oc get route -n $OPENSHIFT_PROJECT
  rules:
    - if: "$REDEPLOY_ONLY"
      when: never
    - if: "$CI_COMMIT_BRANCH =~ /^(feature).*$/"
      changes:
        - "$APP_DIR/**/*"
        - "public/**/*"
        - "*.json"
        - "*.ts"
      when: on_success
    - when: never

deploy_to_openshift_dev:
  stage: deploy
  image: ${HELM_IMAGE}
  environment: dev
  tags:
    - ${TAG}
  variables:
    HELM_SET_ARGS: >
      --history-max 5
      --set image.tag=$IMAGE_TAG_CI_COMMIT_SHA
  script:
    - RELEASE_NAME="${HELM_RELEASE_PREFIX}-dev"
    - echo $RELEASE_NAME
    - echo $IMAGE_TAG_CI_COMMIT_SHA
    - oc login $OPENSHIFT_SERVER --token=$OPENSHIFT_TOKEN --insecure-skip-tls-verify=true
    - oc project $OPENSHIFT_PROJECT
    - helm upgrade --install $RELEASE_NAME ./helm --namespace $OPENSHIFT_PROJECT --values ./helm/values-$CI_ENVIRONMENT_NAME.yaml $HELM_SET_ARGS
    - oc get route -n $OPENSHIFT_PROJECT
  rules:
    - if: "$REDEPLOY_ONLY"
      when: never
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - "$APP_DIR/**/*"
        - "public/**/*"
        - "*.json"
        - "*.ts"
      when: on_success
    - when: never

redeploy_to_dropapp_dev:
  stage: deploy
  image: ${HELM_IMAGE}
  environment: dev
  tags:
    - ${TAG}
  variables:
    HELM_SET_ARGS: >
      --history-max 5
      --set image.tag=$REDEPLOY_IMAGE_TAG_DEV
  script:
    - RELEASE_NAME="${HELM_RELEASE_PREFIX}-dev"
    - echo "Re-deploying $RELEASE_NAME with image:" $REDEPLOY_IMAGE_TAG_DEV
    - oc login $OPENSHIFT_SERVER --token=$OPENSHIFT_TOKEN --insecure-skip-tls-verify=true
    - oc project $OPENSHIFT_PROJECT
    - helm upgrade --install $RELEASE_NAME ./helm --namespace $OPENSHIFT_PROJECT --values ./helm/values-$CI_ENVIRONMENT_NAME.yaml $HELM_SET_ARGS
    - oc get route -n $OPENSHIFT_PROJECT
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $REDEPLOY_ONLY && $REDEPLOY_IMAGE_TAG_DEV'
      when: on_success

check_jira_status:
  stage: pre-merge
  image: ${GIT_IMAGE}
  environment: dev
  tags:
    - kubernetes-lrg
  before_script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
  script:
    - |
      MSG="$CI_MERGE_REQUEST_TITLE"
      echo "Parsing message: $MSG"
      
      ISSUES=$(echo "$MSG" | grep -oE '\[([A-Z]+-[0-9]+)\]' | tr -d '[]' | sort -u)
      if [ -z "$ISSUES" ]; then
        echo "ERROR: No Jira tasks was founded in message. Expected format: [PROJ-1] or [PROJ-1],[PROJ-2]"
        exit 1
      fi
      echo "Founded tasks: $ISSUES"
      
      for ISSUE in $ISSUES; do
        echo "Checking status of $ISSUE..."
        RESPONSE=$(curl -s --max-time 10 -u "$JIRA_USER:$JIRA_PASS" \
          -H "Accept: application/json" \
          "$JIRA_URL/rest/api/2/issue/$ISSUE?fields=status")
      
        if echo "$RESPONSE" | grep -q '"errorMessages"'; then
          echo "ERROR: Jira issue $ISSUE not found or inaccessible"
          echo "Response: $RESPONSE"
          exit 1
        fi
      
        STATUS=$(echo "$RESPONSE" | jq -r '.fields.status.name' 2>/dev/null)
      
        if [ -z "$STATUS" ] || [ "$STATUS" = "null" ]; then
          echo "ERROR: Failed to parse status for $ISSUE"
          echo "Response: $RESPONSE"
          exit 1
        fi
      
        echo "Status of $ISSUE: $STATUS"
      
        case "$STATUS" in
          "Done"|"Won't Do"|"Fixed"|"Won't Fix"|"Duplicate"|"Cannot Reproduce"|"Not a Bug"|"Not relevant"|"Invalid"|"Incomplete"|"Rejected"|"Closed"|"Accepted"|"Defect"|"Declined"|"Canceled")
            echo "ERROR: Jira issue $ISSUE is '$STATUS' - cannot merge to develop"
            exit 1
            ;;
        esac
      done
      
      echo "All issues are open — merge allowed"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^(feature).*$/ && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
      when: always

container-security:
  stage: cybersecurity
  image: registry.sberdevices.ru/appsec-public/containers/container-security:stable
  tags:
    - kubernetes-lrg
  variables:
    CLOUD_CONTAINER_SECURITY_IMAGE: ${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}
  script:
    - source /opt/container-security.sh
  artifacts:
    paths:
      - container-security/*
  rules:
    - if: "$REDEPLOY_ONLY"
      when: never
    - if: '($CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main") || $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: on_success
    - when: never

