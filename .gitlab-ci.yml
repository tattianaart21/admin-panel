    - if: "$CI_COMMIT_BRANCH =~ /^(main|hotfix).*$/"
      changes:
        - "$APP_DIR/**/*"
        - "public/**/*"
        - "*.json"
        - "*.ts"
      when: on_success
    - when: never

redeploy_to_openshift_preprod:
  stage: deploy
  image: ${HELM_IMAGE}
  environment: preprod
  tags:
