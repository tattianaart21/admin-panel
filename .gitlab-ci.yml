  script:
    - RELEASE_NAME="${HELM_RELEASE_PREFIX}-preprod"
    - echo "Re-deploying $RELEASE_NAME with image:" $REDEPLOY_IMAGE_TAG_PD
    - oc login $OPENSHIFT_SERVER --token=$OPENSHIFT_TOKEN --insecure-skip-tls-verify=true
    - oc project $OPENSHIFT_PROJECT
    - helm upgrade --install $RELEASE_NAME ./helm --namespace $OPENSHIFT_PROJECT --values ./helm/values-$CI_ENVIRONMENT_NAME.yaml $HELM_SET_ARGS
